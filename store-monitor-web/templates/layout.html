<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>上新监控</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700;9..144,800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
<div class="shell">

  <aside class="sidebar" id="sidebarPanel">
    <button class="sidebar-close" id="sidebarClose" aria-label="关闭菜单">×</button>
    <div class="sidebar-brand">
      <div class="brand-dot">
        <svg viewBox="0 0 24 24" fill="#ffffff"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
      </div>
      <div class="brand-text">
        <strong>Store Monitor</strong>
        <span>Bright Command Center</span>
      </div>
    </div>

    <nav class="sidebar-nav">
      <a href="/" class="nav-item {% if request.url.path == '/' %}on{% endif %}">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
        总览
      </a>
      <a href="/tasks" class="nav-item {% if request.url.path.startswith('/tasks') %}on{% endif %}">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
        监控任务
      </a>
      <a href="/settings" class="nav-item {% if request.url.path.startswith('/settings') %}on{% endif %}">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 0 0 .12-.61l-1.92-3.32a.488.488 0 0 0-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 0 0-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58a.49.49 0 0 0-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
        邮箱设置
      </a>
    </nav>

    <div class="sidebar-foot">
      <div class="pulse"></div>
      系统运行中
    </div>
  </aside>
  <button class="scrim" id="navScrim" aria-label="关闭侧边栏"></button>

  <div class="main">
    <header class="topbar">
      <div class="topbar-left">
        <button class="menu-toggle" id="menuToggle" aria-label="打开菜单">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
        </button>
        <span class="topbar-title">{% block page_title %}{% endblock %}</span>
      </div>
      <div>{% block topbar_extra %}{% endblock %}</div>
    </header>
    <div class="page">
      {% block content %}{% endblock %}
    </div>
  </div>

</div>
<div id="networkIssueToast" class="network-toast" hidden aria-live="polite" aria-atomic="true">
  <div class="network-toast-card">
    <div class="network-toast-head">
      <div>
        <div class="network-toast-eyebrow">系统提醒</div>
        <strong id="networkIssueToastTitle">抓取网络异常提醒</strong>
      </div>
      <button type="button" class="network-toast-close" id="networkIssueToastClose" aria-label="关闭提醒">×</button>
    </div>
    <p class="network-toast-msg" id="networkIssueToastMessage"></p>
    <p class="network-toast-detail" id="networkIssueToastDetail"></p>
    <p class="network-toast-meta" id="networkIssueToastMeta"></p>
    <div class="network-toast-actions">
      <a href="/tasks" class="btn btn-ghost">查看任务</a>
      <button type="button" class="btn btn-primary" id="networkIssueToastAck">知道了</button>
    </div>
  </div>
</div>
<script src="/static/js/main.js"></script>
</body>
</html>
